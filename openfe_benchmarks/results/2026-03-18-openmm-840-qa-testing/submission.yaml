# REQUIRED: unique, kebab-case identifier for this submission
submission_id: 2026-03-18-openmm-840-qa-testing

# REQUIRED: short descriptive title
title: OpenFE RBFE - charge_annihilation_set, jacs_set (5 systems) - 2026-03-18-openmm-840-qa-testing

# REQUIRED: short descriptive summary (1-2 sentences)
summary: |
  This submission describes QA testing using openmm-8.4 with the charge_annihilation_set and jacs_set RBFE benchmark
  (charge_annihilation_set: egfr, irak4_s2, irak4_s3; jacs_set: p38, tyk2) prepared with openff-2.3.0
  and nagl_openff-gnn-am1bcc-1.0.0.pt. The submission contains 160 transformations, 61 unique ligands,
  and 5 unique proteins. The largest simulated chemical system contains 6744 atoms. Note this means the charge annihilation sets are not complete compared to what is in that system and should not be compared to other complete runs due to the missing edges.
  This submission was run locally on HPC3 and so no AlchemicalArchive is available but the raw outputs are included in the Zenodo archive.

# REQUIRED: list of submission tags
tags: [rbfe, openff-2.3.0, nagl_openff-gnn-am1bcc-1.0.0.pt, charge_change, benchmark, openfe, openmm-840]

# REQUIRED: list of contributing authors (name, affiliation; ORCID optional)
authors:
  - name: Josh Horton

# REQUIRED: publication/submission date (ISO 8601)
date: 2026-06-04

# REQUIRED: OpenFE/OpenMM/toolkit versions used to produce gathered reports
openfe_version: 1.9.1
openmm_version: 8.4.0
openff_toolkit_version: 0.18.0

# Recommended descriptors
forcefield: openff-2.3.0
partial_charges: nagl_openff-gnn-am1bcc-1.0.0.pt

# BenchmarkData provenance (from openfe-benchmarks planning script)
benchmark_data:
  source_repository: https://github.com/OpenFreeEnergy/openfe-benchmarks
  set: charge_annihilation_set, jacs_set
  system: egfr, irak4_s2, irak4_s3, p38, tyk2

# REQUIRED: results file
results: computational_results.json

# REQUIRED: long-term archive pointer (at least doi or url)
archive:
  doi: TODO add DOI
  archive_provider: TODO add archive provider

