# REQUIRED: unique, kebab-case identifier for this submission
submission_id: 2026-03-18-openmm-840-qa-testing

# REQUIRED: short descriptive title
title: OpenFE RBFE - Multi-set Benchmark (2 sets, 5 systems) - 2026-03-18-openmm-840-qa-testing

# REQUIRED: short descriptive summary (1-2 sentences)
summary: |
  This submission describes the charge_annihilation_set, jacs_set RBFE benchmark
  (charge_annihilation_set: egfr, irak4_s2, irak4_s3; jacs_set: p38, tyk2) prepared with
  tip3p_HFE_multivalent;amber/amber/tip3p_standard;amber/ff14SB/phosaa10;amber and am1bcc. The
  submission contains 160 transformations, 45 unique ligands, and 1 unique proteins. Note this means
  the charge annihilation sets are not complete compared to what is in that system and should not be
  compared to other complete runs due to the missing edges.

# REQUIRED: list of submission tags
tags: [rbfe, tip3p_HFE_multivalent;amber, amber, tip3p_standard;amber, ff14SB, phosaa10;amber, am1bcc, charge_change, benchmark, openfe, openmm-840]

# REQUIRED: list of contributing authors (name, affiliation; ORCID optional)
authors:
