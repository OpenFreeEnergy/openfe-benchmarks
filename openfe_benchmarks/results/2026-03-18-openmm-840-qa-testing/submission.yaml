license: CC-BY-4.0

# RECOMMENDED / OPTIONAL metadata for protocol settings
protocol_settings:
  - protocol: RelativeHybridTopologyProtocol
    count: 3
    systems: "charge_annihilation_set/egfr, charge_annihilation_set/irak4_s2, charge_annihilation_set/irak4_s3"
    files: "charge_annihilation_set_egfr_alchemicalnetwork.json, charge_annihilation_set_irak4_s2_alchemicalnetwork.json, charge_annihilation_set_irak4_s3_alchemicalnetwork.json"
    production_time: "20 nanosecond"
    equilibration_time: "1.0 nanosecond"
    timestep: "4.0 femtosecond"
    temperature: "298.15 kelvin"
    pressure: "1 bar"
    lambda_windows: "22"
  - protocol: RelativeHybridTopologyProtocol
    count: 2
    systems: "jacs_set/p38, jacs_set/tyk2"
    files: "alchemicalnetwork.json"
    production_time: "5.0 nanosecond"
    equilibration_time: "1.0 nanosecond"
    timestep: "4.0 femtosecond"
    temperature: "298.15 kelvin"
    pressure: "1 bar"
    lambda_windows: "11"
