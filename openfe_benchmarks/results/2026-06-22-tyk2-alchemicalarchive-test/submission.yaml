# REQUIRED: short descriptive title
title: OpenFE RBFE - jacs_set - tyk2 - 2026-06-22-tyk2-alchemicalarchive-test

# REQUIRED: short descriptive summary (1-2 sentences)
summary: |
  This submission describes the jacs_set RBFE benchmark prepared with
  ff14SB/phosaa10/tip3p_HFE_multivalent/tip3p_standard for proteins and solvents, and openff-2.3.0
  with nagl_openff-gnn-am1bcc-1.0.0.pt for ligands, solutes, and cofactors. The network contains 44
  edges across 12 unique ligands. Results are derived from archived Alchemiscale workflow data. This
  subset of the JACS set is meant to provide an example of an alchemical archive submission and
  provide an indication of the variability in results.

